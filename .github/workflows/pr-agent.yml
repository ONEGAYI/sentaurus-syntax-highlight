name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # 仅在非 draft PR 或以 '/' 开头的评论时触发
    if: |
      ${{ (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
          (github.event_name == 'issue_comment' &&
           startsWith(github.event.comment.body, '/') &&
           github.event.comment.user.login != 'github-actions[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent
    steps:
      - name: PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # DeepSeek API Key（需在仓库 Settings > Secrets 中添加）
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}

          # ── 模型 ──
          CONFIG_MODEL: "deepseek/deepseek-v4-flash"
          CONFIG_CUSTOM_MODEL_MAX_TOKENS: 131072

          # ── 语言（控制输出语言） ──
          CONFIG_RESPONSE_LANGUAGE: "zh-CN"

          # ── 行级 inline 评论（类似 CodeRabbit） ──
          PR_REVIEWER_INLINE_CODE_COMMENTS: true

          # ── 自定义提示词（每个工具可单独设置 extra_instructions） ──
          PR_REVIEWER_EXTRA_INSTRUCTIONS: "关注代码逻辑正确性、潜在 bug、安全问题。不要评论代码风格或格式问题。"
          PR_CODE_SUGGESTIONS_EXTRA_INSTRUCTIONS: "只建议确实能改善代码质量或修复问题的改动，不要做纯风格调整。"

          # ── 文件排除（同步自 .coderabbit.yaml） ──
          IGNORE__GLOB: >-
            ["dist/**","**/*.lock","docs/**","references/**","*.md","display_test/**","benchmarks/**","build/**","scripts/**","temp/**","syntaxes/tree-sitter-tcl.wasm",".vscode/**",".claude/**",".serena/**",".gitignore",".coderabbit.yaml","language-configuration.json","language-configurations/**","snippets/*.json"]
