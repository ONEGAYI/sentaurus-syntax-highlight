name: CodeRabbit Retry

on:
  schedule:
    - cron: '17 * * * *' # 每小时运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  retry:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Retry CodeRabbit Reviews
        uses: idrinth/coderabbit-retry-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          max-retries: '4'
          cooldown-hours: '2'
